<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stone,paper and scissors</title>
    <link rel="stylesheet" href="gameStyle.css">
</head>
<body>
    <h1 class="heading">stone, paper and scissors</h1>
    <div class="choices">
        <div class="choice" id="stone">
            <img src="./game-images/rockimage.jpg">
        </div>
        <div class="choice" id="paper">
            <img src="./game-images/paperimage.jpg">
        </div>
        <div class="choice" id="scissors">
            <img src="./game-images/scissorsimage.png">
        </div>
    </div>
    <div class="score-board">
        <div class="Score">
            <p id="user-score">0</p>
            <p>you</p>
        </div>
        <div class="Score">
            <p id="comp-score">0</p>
            <p>computer</p>
        </div>
    </div>
    <div class="msg-container">
        <p id="msg">play your move</p>
    </div>

   <script src="myscript.js"></script>
</body>
</html>
